# =============================================================================
#  Sample Wazuh SCA Policy — CIS Domain Controller benchmark (Windows 11)
#  Reference: https://documentation.wazuh.com/current/user-manual/
#             capabilities/sec-config-assessment/creating-custom-policies.html
# =============================================================================

policy:
  id: "sca_win11_dc_demo"
  file: "sample_policy.yaml"
  name: "CIS Domain Controller Benchmark (Windows 11)"
  description: "Covers all SCA rule types: f: d: p: c: r: with all content operators and conditions"
  references:
    - https://documentation.wazuh.com/current/user-manual/capabilities/sec-config-assessment/creating-custom-policies.html
    - https://www.cisecurity.org/benchmark/microsoft_windows_server

# Requirements: ALL must pass before any checks run.
# Windows 11 is identified by:
#   - Build number >= 22000  (registry: CurrentBuild)
#   - The OS being Windows   (registry hive accessible)
requirements:
  title: "Requires Windows 11 (build 22000+)"
  description: "This policy targets Windows 11 Domain Controllers only"
  condition: all
  rules:
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 11'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> CurrentBuild -> n:^(\d+) compare >= 22000'

# Reusable path variables (prefixed with $)
variables:
  $hosts:  /etc/hosts
  $passwd: /etc/passwd
  $shells: /etc/shells

checks:

  # ---------------------------------------------------------------------------
  # FILE EXISTENCE  (f: without "->")
  # ---------------------------------------------------------------------------
  - id: 1001
    title: "Ensure /etc/hosts file exists"
    description: "The hosts file provides local hostname-to-IP mappings"
    rationale: "Without /etc/hosts, loopback name resolution may fail"
    remediation: "Create /etc/hosts with at least '127.0.0.1  localhost'"
    condition: all
    rules:
      - 'f:$hosts'

  - id: 1002
    title: "Ensure /etc/passwd file exists"
    description: "The passwd file is required for user account lookups"
    rationale: "Without /etc/passwd, authentication and user lookups fail"
    remediation: "Restore /etc/passwd from backup or re-provision the OS"
    condition: all
    rules:
      - 'f:$passwd'

  # ---------------------------------------------------------------------------
  # FILE CONTENT — regex  (f: -> r:PATTERN)
  # ---------------------------------------------------------------------------
  - id: 1003
    title: "Ensure /etc/hosts defines the loopback address"
    description: "127.0.0.1 must be mapped to 'localhost'"
    rationale: "Applications assume localhost resolves to 127.0.0.1"
    remediation: "Add '127.0.0.1  localhost' to /etc/hosts"
    condition: all
    rules:
      - 'f:$hosts -> r:^127\.0\.0\.1\s+localhost'

  - id: 1004
    title: "Ensure /etc/passwd uses colon-delimited format"
    description: "Each entry must follow username:password:uid:gid:..."
    rationale: "Malformed entries break user lookups and authentication"
    condition: all
    rules:
      - 'f:$passwd -> r:^[^:]+:[^:]*:[0-9]+:[0-9]+'

  # ---------------------------------------------------------------------------
  # FILE CONTENT — negated regex  (f: -> !r:PATTERN)
  # Passes when the pattern is NOT found in any line
  # ---------------------------------------------------------------------------
  - id: 1005
    title: "Ensure no account has an empty password hash in /etc/passwd"
    description: "Accounts with empty passwords (user::uid:...) are a critical risk"
    rationale: "An empty password field allows login without authentication"
    remediation: "Lock affected accounts: passwd -l <username>"
    condition: none
    rules:
      - 'f:$passwd -> r:^[^:]+::[0-9]+'

  - id: 1006
    title: "Ensure broadcast address is not aliased to localhost"
    description: "255.255.255.255 must not appear as an alias for localhost"
    rationale: "Such a mapping causes incorrect network packet routing"
    condition: none
    rules:
      - 'f:$hosts -> r:^255\.255\.255\.255\s+localhost'

  # ---------------------------------------------------------------------------
  # FILE CONTENT — AND-conditions  (f: -> cond1 && cond2 && ...)
  # Looks for a SINGLE LINE satisfying ALL conditions simultaneously
  # ---------------------------------------------------------------------------
  - id: 1007
    title: "Ensure localhost line in /etc/hosts is not commented out"
    description: "The loopback entry must be an active (non-comment) line"
    rationale: "A commented-out localhost entry is not effective"
    remediation: "Remove the leading '#' from the localhost line"
    condition: all
    rules:
      - 'f:$hosts -> !r:^# && r:127\.0\.0\.1 && r:localhost'

  # ---------------------------------------------------------------------------
  # DIRECTORY EXISTENCE  (d: without "->")
  # ---------------------------------------------------------------------------
  - id: 1008
    title: "Ensure /tmp directory exists"
    description: "The /tmp directory must be present for temporary file storage"
    rationale: "Many system programs and installers require /tmp"
    remediation: "mkdir /tmp && chmod 1777 /tmp"
    condition: all
    rules:
      - 'd:/tmp'

  - id: 1009
    title: "Ensure /etc directory exists"
    description: "The /etc configuration directory must be present"
    condition: all
    rules:
      - 'd:/etc'

  # ---------------------------------------------------------------------------
  # PROCESS CHECK  (p:process_name)
  # ---------------------------------------------------------------------------
  - id: 1010
    title: "Ensure system init process is running"
    description: "launchd (macOS), systemd, or init must be active"
    rationale: "The init system is responsible for starting all other services"
    condition: any
    rules:
      - 'p:launchd'
      - 'p:systemd'
      - 'p:init'

  - id: 1011
    title: "Ensure a nonexistent process is NOT running (NONE condition demo)"
    description: "A clearly fake process name must not be found in the process list"
    rationale: "Demonstrates the NONE condition — check passes when no rule matches"
    condition: none
    rules:
      - 'p:obviously_fake_process_xyz_99999'

  # ---------------------------------------------------------------------------
  # COMMAND OUTPUT — regex  (c:CMD -> r:PATTERN)
  # ---------------------------------------------------------------------------
  - id: 1012
    title: "Ensure hostname command returns a valid value"
    description: "The system must have a configured hostname"
    rationale: "A missing hostname causes issues with logging and network identity"
    remediation: "Set the hostname: hostname <name>"
    condition: all
    rules:
      - 'c:hostname -> r:\w+'

  - id: 1013
    title: "Ensure the OS kernel family is recognised"
    description: "uname -s should report Linux, Darwin, or FreeBSD"
    condition: any
    rules:
      - 'c:uname -s -> r:Linux'
      - 'c:uname -s -> r:Darwin'
      - 'c:uname -s -> r:FreeBSD'

  - id: 1014
    title: "Ensure /etc/passwd is listed as a readable file by ls"
    description: "The passwd file must be accessible to the current user"
    condition: all
    rules:
      - 'c:ls /etc/passwd -> r:passwd'

  # ---------------------------------------------------------------------------
  # COMMAND OUTPUT — negated regex  (c:CMD -> !r:PATTERN)
  # ---------------------------------------------------------------------------
  - id: 1015
    title: "Ensure id command does not report root UID"
    description: "Scanner should not run as root (UID 0)"
    rationale: "Running security tooling as root unnecessarily increases attack surface"
    remediation: "Re-run as a non-privileged user"
    condition: all
    rules:
      - 'c:id -> !r:uid=0\(root\)'

  # ---------------------------------------------------------------------------
  # COMMAND OUTPUT — numeric  (c:CMD -> n:PATTERN compare OP VALUE)
  # ---------------------------------------------------------------------------
  - id: 1016
    title: "Ensure current user UID is greater than 0 (not root)"
    description: "Numeric check: UID extracted from 'id -u' must be > 0"
    rationale: "Root UID of 0 means all actions run with full system privileges"
    remediation: "Re-run as a non-privileged user"
    condition: all
    rules:
      - 'c:id -u -> n:^(\d+) compare > 0'

  - id: 1017
    title: "Ensure uname -r major kernel version is at least 1"
    description: "Numeric check: first version number in kernel release must be >= 1"
    condition: all
    rules:
      - 'c:uname -r -> n:^(\d+) compare >= 1'

  # ---------------------------------------------------------------------------
  # MULTI-RULE CHECK with CONDITION: any
  # ---------------------------------------------------------------------------
  - id: 1018
    title: "Ensure at least one shell config file exists"
    description: "One of /etc/shells, /etc/bash.bashrc, or /etc/profile must exist"
    rationale: "Shell config files are required for a functional login environment"
    condition: any
    rules:
      - 'f:$shells'
      - 'f:/etc/bash.bashrc'
      - 'f:/etc/profile'
      - 'f:/private/etc/shells'

  # ---------------------------------------------------------------------------
  # WINDOWS-ONLY: Registry check  (r:HIVE\PATH -> VALUE -> DATA)
  # Automatically FAILS on macOS/Linux with a clear platform message
  # ---------------------------------------------------------------------------
  - id: 1019
    title: "[Windows] Ensure LimitBlankPasswordUse policy is enforced"
    description: "Registry must prevent blank passwords from being used over the network"
    rationale: "Without this setting, accounts with empty passwords can log in remotely"
    remediation: "Set HKLM\\System\\CurrentControlSet\\Control\\Lsa\\LimitBlankPasswordUse to 1"
    condition: all
    rules:
      - 'r:HKLM\System\CurrentControlSet\Control\Lsa -> LimitBlankPasswordUse -> 1'
