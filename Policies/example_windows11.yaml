# =============================================================================
#  Wazuh SCA Policy — CIS Windows 11 Workstation / Domain Controller baseline
#  Reference: https://documentation.wazuh.com/current/user-manual/
#             capabilities/sec-config-assessment/creating-custom-policies.html
# =============================================================================

policy:
  id: "example_windows11"
  file: "example_windows11.yaml"
  name: "CIS Windows 11 Baseline"
  description: "Registry and system hardening checks for Windows 11 workstations and domain controllers"
  references:
    - https://documentation.wazuh.com/current/user-manual/capabilities/sec-config-assessment/creating-custom-policies.html
    - https://www.cisecurity.org/benchmark/microsoft_windows_desktop

# Requirements: ALL must pass before any checks run.
# Windows 11 is identified by build >= 22000 and the ProductName starting with "Windows 11".
requirements:
  title: "Requires Windows 11 (build 22000+)"
  description: "This policy targets Windows 11 workstations and domain controllers only"
  condition: all
  rules:
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 1[01]'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> CurrentBuild -> n:^(\d+) compare >= 22000'

# Reusable Windows path variables
variables:
  $system32: C:\Windows\System32
  $drivers_etc: C:\Windows\System32\drivers\etc

checks:

  # ---------------------------------------------------------------------------
  # CREDENTIAL & AUTHENTICATION HARDENING  (r:)
  # ---------------------------------------------------------------------------
  - id: 1001
    title: "Ensure blank password use over network is restricted"
    description: "LimitBlankPasswordUse must be set to 1 in LSA registry settings"
    rationale: "Without this, accounts with empty passwords can authenticate over the network"
    remediation: >
      Set HKLM\System\CurrentControlSet\Control\Lsa\LimitBlankPasswordUse = 1
      via Group Policy: Security Settings > Local Policies > Security Options
    condition: all
    rules:
      - 'r:HKLM\System\CurrentControlSet\Control\Lsa -> LimitBlankPasswordUse -> 1'

  - id: 1002
    title: "Ensure LAN Manager hash storage is disabled"
    description: "NoLMHash must be set to 1 to prevent storage of weak LM password hashes"
    rationale: "LM hashes are trivially crackable; disabling them forces NTLM/Kerberos only"
    remediation: >
      Set HKLM\System\CurrentControlSet\Control\Lsa\NoLMHash = 1
    condition: all
    rules:
      - 'r:HKLM\System\CurrentControlSet\Control\Lsa -> NoLMHash -> 1'

  - id: 1003
    title: "Ensure NTLMv2 session security is required for NTLM clients"
    description: "NTLMMinClientSec must require 128-bit encryption and NTLMv2 (value 537395200)"
    rationale: "Weaker NTLM versions are vulnerable to downgrade and relay attacks"
    remediation: >
      Set HKLM\System\CurrentControlSet\Control\Lsa\MSV1_0\NTLMMinClientSec = 537395200
    condition: all
    rules:
      - 'r:HKLM\System\CurrentControlSet\Control\Lsa\MSV1_0 -> NTLMMinClientSec -> 537395200'

  # ---------------------------------------------------------------------------
  # UAC (User Account Control)  (r:)
  # ---------------------------------------------------------------------------
  - id: 1004
    title: "Ensure User Account Control (UAC) is enabled"
    description: "EnableLUA must be set to 1 in the System registry key"
    rationale: "UAC restricts privilege elevation and reduces the impact of malware"
    remediation: >
      Set HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\EnableLUA = 1
    condition: all
    rules:
      - 'r:HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System -> EnableLUA -> 1'

  - id: 1005
    title: "Ensure UAC Admin Approval Mode is enabled for built-in Administrator"
    description: "FilterAdministratorToken must be set to 1"
    rationale: "Without this, the built-in Administrator runs without UAC prompts"
    remediation: >
      Set HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\FilterAdministratorToken = 1
    condition: all
    rules:
      - 'r:HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System -> FilterAdministratorToken -> 1'

  # ---------------------------------------------------------------------------
  # WINDOWS FIREWALL  (r:)
  # ---------------------------------------------------------------------------
  - id: 1006
    title: "Ensure Windows Firewall is enabled for the Domain profile"
    description: "EnableFirewall must be 1 under the Domain profile key"
    rationale: "The firewall provides critical protection on domain-joined networks"
    remediation: >
      Enable via: netsh advfirewall set domainprofile state on
    condition: all
    rules:
      - 'r:HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\DomainProfile -> EnableFirewall -> 1'

  - id: 1007
    title: "Ensure Windows Firewall is enabled for the Private profile"
    description: "EnableFirewall must be 1 under the Private profile key"
    rationale: "Private networks should still be protected by the firewall"
    remediation: >
      Enable via: netsh advfirewall set privateprofile state on
    condition: all
    rules:
      - 'r:HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile -> EnableFirewall -> 1'

  - id: 1008
    title: "Ensure Windows Firewall is enabled for the Public profile"
    description: "EnableFirewall must be 1 under the Public profile key"
    rationale: "Public networks are the highest risk; firewall must always be on"
    remediation: >
      Enable via: netsh advfirewall set publicprofile state on
    condition: all
    rules:
      - 'r:HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile -> EnableFirewall -> 1'

  # ---------------------------------------------------------------------------
  # REMOTE ACCESS  (r:)
  # ---------------------------------------------------------------------------
  - id: 1009
    title: "Ensure Remote Desktop requires Network Level Authentication (NLA)"
    description: "UserAuthentication must be 1 in the Terminal Server WinStations key"
    rationale: "NLA authenticates users before a full RDP session is established, reducing attack surface"
    remediation: >
      Set HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp\UserAuthentication = 1
    condition: all
    rules:
      - 'r:HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp -> UserAuthentication -> 1'

  - id: 1010
    title: "Ensure SMBv1 protocol is disabled"
    description: "SMB1Protocol value must be 0 to disable the legacy SMBv1 protocol"
    rationale: "SMBv1 is exploited by WannaCry and other ransomware; it must be disabled"
    remediation: >
      Set HKLM\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters\SMB1 = 0, then reboot
    condition: all
    rules:
      - 'r:HKLM\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters -> SMB1 -> 0'

  # ---------------------------------------------------------------------------
  # AUTORUN / AUTOPLAY  (r:)
  # ---------------------------------------------------------------------------
  - id: 1011
    title: "Ensure AutoRun is disabled for all drives"
    description: "NoDriveTypeAutoRun must be 255 (0xFF) to disable AutoRun on all drive types"
    rationale: "AutoRun allows malicious code on removable media to execute automatically"
    remediation: >
      Set HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer\NoDriveTypeAutoRun = 255
    condition: all
    rules:
      - 'r:HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer -> NoDriveTypeAutoRun -> 255'

  # ---------------------------------------------------------------------------
  # FILE SYSTEM  (f:, d:)
  # ---------------------------------------------------------------------------
  - id: 1012
    title: "Ensure Windows hosts file exists"
    description: "The hosts file at %WINDIR%\\System32\\drivers\\etc\\hosts must be present"
    rationale: "The hosts file is required for local name resolution"
    remediation: "Restore the default hosts file from a known-good Windows installation"
    condition: all
    rules:
      - 'f:$drivers_etc\hosts'

  - id: 1013
    title: "Ensure Windows hosts file defines the loopback address"
    description: "The line '127.0.0.1  localhost' must be present and uncommented"
    rationale: "Applications depend on localhost resolving to 127.0.0.1"
    remediation: "Add '127.0.0.1  localhost' to %WINDIR%\\System32\\drivers\\etc\\hosts"
    condition: all
    rules:
      - 'f:$drivers_etc\hosts -> !r:^# && r:127\.0\.0\.1 && r:localhost'

  - id: 1014
    title: "Ensure the Windows System32 directory exists"
    description: "C:\\Windows\\System32 must be present"
    rationale: "System32 contains critical OS executables; its absence indicates severe corruption"
    condition: all
    rules:
      - 'd:$system32'

  # ---------------------------------------------------------------------------
  # PROCESSES  (p:)
  # ---------------------------------------------------------------------------
  - id: 1015
    title: "Ensure the Windows Service Host (svchost) process is running"
    description: "svchost.exe is the host process for Windows services and must be running"
    rationale: "Without svchost, critical Windows services cannot run"
    condition: all
    rules:
      - 'p:svchost'

  - id: 1016
    title: "Ensure Windows Security Center service is running"
    description: "SecurityHealthService or wscsvc must be active"
    rationale: "Security Center monitors AV, firewall, and update status"
    condition: any
    rules:
      - 'p:SecurityHealthService'
      - 'p:wscsvc'

  # ---------------------------------------------------------------------------
  # COMMAND OUTPUT — numeric  (c: -> n:)
  # ---------------------------------------------------------------------------
  - id: 1017
    title: "Ensure Windows 11 build number is at least 22621 (22H2)"
    description: "Numeric check on CurrentBuild to confirm 22H2 or later is installed"
    rationale: "Build 22621 (22H2) includes critical security patches not present in 22000 (21H2)"
    remediation: "Update Windows to version 22H2 or later via Windows Update"
    condition: all
    rules:
      - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> CurrentBuild -> n:^(\d+) compare >= 22621'

  # ---------------------------------------------------------------------------
  # WINDOWS DEFENDER / ANTIMALWARE  (r:)
  # ---------------------------------------------------------------------------
  - id: 1018
    title: "Ensure Windows Defender real-time protection is enabled"
    description: "DisableRealtimeMonitoring must be absent or set to 0"
    rationale: "Real-time monitoring detects and blocks malware as it is written or executed"
    remediation: >
      Enable via: Set-MpPreference -DisableRealtimeMonitoring $false
    condition: none
    rules:
      - 'r:HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection -> DisableRealtimeMonitoring -> 1'

  - id: 1019
    title: "Ensure Windows Script Host is disabled (or not overridden)"
    description: "Enabled value under Windows Script Host settings must not be 0 (explicit disable only)"
    rationale: "WSH is commonly abused by malware to run VBScript/JScript payloads"
    remediation: >
      Set HKLM\SOFTWARE\Microsoft\Windows Script Host\Settings\Enabled = 0 to restrict script execution
    condition: none
    rules:
      - 'r:HKLM\SOFTWARE\Microsoft\Windows Script Host\Settings -> Enabled -> 1'
